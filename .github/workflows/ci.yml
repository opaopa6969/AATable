name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  lint-and-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check (py_compile)
        run: python -m py_compile *.py

      - name: Install pytest (optional)
        id: install_pytest
        run: |
          pip install pytest || echo "pytest_install_failed=true" >> "$GITHUB_OUTPUT"

      - name: Run pytest
        if: steps.install_pytest.outputs.pytest_install_failed != 'true'
        run: |
          if python -c "import pytest" 2>/dev/null; then
            python -m pytest --tb=short || echo "::warning::pytest run failed (no tests or test errors)"
          else
            echo "::warning::pytest not available, skipping tests"
          fi
